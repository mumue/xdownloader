<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Batch Streamer - Auto Open Tabs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <div class="max-w-5xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-center mb-2">🔥 Batch Streamer</h1>
    <p class="text-center text-red-400 mb-8">Multiple Links • Best MP4 • Auto Open Tab Streaming</p>

    <div class="bg-gray-900 rounded-3xl p-8">
      <textarea id="urlsInput" rows="6" class="w-full bg-gray-800 border border-gray-700 rounded-2xl p-6 text-lg focus:outline-none focus:border-red-500 resize-none" 
                placeholder="Paste banyak link txnhh.com / xnxx di sini (1 link per baris)"></textarea>

      <button onclick="extractAndAutoOpen()" 
              class="mt-4 w-full bg-red-600 hover:bg-red-700 py-5 rounded-2xl font-bold text-xl flex items-center justify-center gap-3">
        <i class="fas fa-bolt"></i> EXTRACT &amp; BUKA SEMUA OTOMATIS DI TAB BARU
      </button>

      <div id="result" class="mt-10"></div>
    </div>
  </div>

  <script>
    async function extractAndAutoOpen() {
      const text = document.getElementById('urlsInput').value.trim();
      if (!text) return alert("Paste link dulu bro!");

      const urls = text.split('\n').filter(u => u.trim());
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = `<p class="text-center py-12"><i class="fas fa-spinner fa-spin text-4xl"></i><br>Sedang mengambil video terbaik...</p>`;

      const res = await fetch('/extract', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({urls})
      });
      const data = await res.json();

      if (!data.videos || data.videos.length === 0) {
        resultDiv.innerHTML = `<p class="text-red-400 text-center py-8">❌ Tidak ada video yang berhasil diambil</p>`;
        return;
      }

      // Auto open semua tab
      let opened = 0;
      data.videos.forEach((v, index) => {
        setTimeout(() => {
          const win = window.open(v.direct_url, '_blank');
          if (win) opened++;
          if (index === data.videos.length - 1) {
            resultDiv.innerHTML = `
              <div class="text-center py-12">
                <i class="fas fa-check-circle text-green-400 text-6xl mb-4"></i>
                <h2 class="text-3xl font-bold text-green-400">✅ Berhasil!</h2>
                <p class="text-xl mt-2">${data.videos.length} video sedang dibuka di tab baru</p>
                <p class="text-gray-400 mt-6">Video akan langsung streaming otomatis di setiap tab</p>
              </div>`;
          }
        }, index * 300); // delay 300ms tiap tab biar tidak kena pop-up blocker
      });
    }
  </script>
</body>
</html>
