<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Batch Streamer - Open in New Tab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <div class="max-w-5xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-center mb-2">🔥 Batch Streamer</h1>
    <p class="text-center text-red-400 mb-8">Multiple Links • Best MP4 • Open Streaming di Tab Baru</p>

    <div class="bg-gray-900 rounded-3xl p-8">
      <textarea id="urlsInput" rows="6" class="w-full bg-gray-800 border border-gray-700 rounded-2xl p-6 text-lg focus:outline-none focus:border-red-500 resize-none" 
                placeholder="Paste banyak link txnhh.com / xnxx di sini (1 link per baris)"></textarea>

      <button onclick="extractAndOpenTabs()" 
              class="mt-4 w-full bg-red-600 hover:bg-red-700 py-5 rounded-2xl font-bold text-xl flex items-center justify-center gap-3">
        <i class="fas fa-play"></i> EXTRACT &amp; BUKA SEMUA DI TAB BARU (Streaming)
      </button>

      <div id="result" class="mt-10 hidden"></div>
    </div>
  </div>

  <script>
    async function extractAndOpenTabs() {
      const text = document.getElementById('urlsInput').value.trim();
      if (!text) return alert("Paste link dulu bro!");

      const urls = text.split('\n').filter(u => u.trim());
      const resultDiv = document.getElementById('result');
      resultDiv.classList.remove('hidden');
      resultDiv.innerHTML = `<p class="text-center py-12"><i class="fas fa-spinner fa-spin text-4xl"></i><br>Sedang mengambil best MP4...</p>`;

      const res = await fetch('/extract', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({urls})
      });
      const data = await res.json();

      if (data.videos.length === 0) {
        resultDiv.innerHTML = `<p class="text-red-400 text-center py-8">❌ Tidak ada video yang berhasil diambil</p>`;
        return;
      }

      let html = `<h2 class="text-2xl mb-6 text-green-400">✅ Ditemukan ${data.videos.length} video</h2>`;
      
      data.videos.forEach((v, i) => {
        html += `
          <div class="bg-gray-800 rounded-2xl p-5 mb-4 flex gap-4 items-center hover:bg-gray-700 transition">
            <img src="${v.thumbnail || ''}" class="w-28 h-20 object-cover rounded-xl">
            <div class="flex-1">
              <p class="font-semibold line-clamp-2">${v.title}</p>
              <p class="text-red-400 text-sm mt-1">${v.quality} • Streaming Ready</p>
            </div>
            <button onclick="openVideo('${v.direct_url}', '${v.title}')" 
                    class="bg-green-600 hover:bg-green-700 px-8 py-3 rounded-2xl font-bold flex items-center gap-2">
              <i class="fas fa-play"></i> PLAY
            </button>
          </div>`;
      });

      resultDiv.innerHTML = html + `<p class="text-center text-gray-400 mt-8 text-sm">Klik tombol PLAY untuk buka streaming di tab baru</p>`;
    }

    function openVideo(url, title) {
      const safeTitle = title.replace(/[^a-zA-Z0-9]/g, '_');
      const win = window.open(url, '_blank');
      if (win) {
        win.focus();
      } else {
        alert("Pop-up diblokir! Izinkan pop-up di browser kamu.");
      }
    }
  </script>
</body>
</html>
